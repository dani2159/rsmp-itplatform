# Nginx untuk container frontend (Docker). Versi bare-metal ada di
# nginx/rs-it-platform.conf (path /opt/rsmp-it-platform, service by 127.0.0.1).
# Di sini target proxy pakai nama service Docker Compose (backend, novnc-proxy).
#
# Catatan: ISO Builder (butuh xorriso/squashfs-tools/loop mount, akses privileged
# ke host) TIDAK didukung di deployment Docker -- pakai deployment bare-metal
# kalau butuh fitur itu.

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 500M;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    location /ws {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /novnc/ {
        alias /usr/share/novnc/;
        index vnc.html;
        add_header X-Frame-Options SAMEORIGIN;
    }

    location ~ ^/novnc-ws/ {
        proxy_pass         http://novnc-proxy:6081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   X-Original-URI $request_uri;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /uploads/ {
        alias /data/uploads/;
    }

    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
