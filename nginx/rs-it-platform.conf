# /etc/nginx/sites-available/rs-it-platform
# RS-IT Platform — FIXED nginx config v2.0
# FIX: noVNC path, WebSocket upgrade, VNC proxy routing

server {
    listen 8080 default_server;
    server_name _;

    client_max_body_size 500M;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── API Backend (REST) ───────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support untuk /api endpoints
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
    }

    # ── WebSocket Terminal & Agent ───────────────
    location /ws {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── noVNC Static Files ───────────────────────
    # noVNC HTML/JS files
    location /novnc/ {
        alias /usr/share/novnc/;
        index vnc.html;

        # Allow iframe embedding
        add_header X-Frame-Options "SAMEORIGIN";
    }

    # ── VNC WebSocket Proxy per-client ───────────
    # Format: /novnc-ws/<client_ip>/<vnc_port>
    # Proxy ke novnc-proxy.py di port 6081
    location ~ ^/novnc-ws/(.+)$ {
        proxy_pass         http://127.0.0.1:6081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade        $http_upgrade;
        proxy_set_header   Connection     "upgrade";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;

        # Extract IP dan port dari URL, teruskan sebagai header
        # /novnc-ws/192.168.1.101/5901 → X-Target-Host: 192.168.1.101, X-Target-Port: 5901
        proxy_set_header   X-Original-URI $request_uri;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering untuk WebSocket
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── ISO & Upload Downloads ───────────────────
    location /isos/ {
        alias /opt/rsmp-it-platform/isos/;
        add_header Content-Disposition "attachment";
    }

    location /uploads/ {
        alias /opt/rsmp-it-platform/uploads/;
    }

    # ── Frontend React SPA ───────────────────────
    location / {
        root  /opt/rsmp-it-platform/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}

# Map untuk WebSocket connection upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
