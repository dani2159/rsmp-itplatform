# ============================================================
#  RSMP-IT Platform — Nginx Config FINAL
#  Copy ke: /etc/nginx/sites-available/rsmp-it
#  Symlink: ln -sf /etc/nginx/sites-available/rsmp-it /etc/nginx/sites-enabled/rsmp-it
# ============================================================

# Map HARUS di luar server block (di level http)
# Jika pakai sites-available, pastikan nginx.conf punya include sites-enabled/*
# ATAU tambahkan map ini ke /etc/nginx/nginx.conf di dalam blok http {}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080 default_server;
    server_name _;

    client_max_body_size 500M;
    proxy_connect_timeout  60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── REST API + WebSocket Auth ─────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── SSH Terminal & Agent WebSocket ────────────
    location /ws {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── noVNC Static Files ────────────────────────
    location /novnc/ {
        alias /usr/share/novnc/;
        index vnc.html;
        add_header X-Frame-Options "SAMEORIGIN";
    }

    # ── VNC WebSocket per-client ──────────────────
    # Format: /novnc-ws/192.168.1.x/5901
    location ~ ^/novnc-ws/(.+)$ {
        proxy_pass         http://127.0.0.1:6081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade        $http_upgrade;
        proxy_set_header   Connection     "upgrade";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Original-URI $request_uri;
        proxy_read_timeout 86400s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── Static Downloads ──────────────────────────
    location /isos/ {
        alias /opt/rsmp-it-platform/isos/;
        add_header Content-Disposition "attachment";
    }

    location /uploads/ {
        alias /opt/rsmp-it-platform/uploads/;
    }

    # ── React SPA ─────────────────────────────────
    location / {
        root  /opt/rsmp-it-platform/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
